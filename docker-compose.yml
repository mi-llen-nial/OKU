services:
  db:
    image: postgres:16-alpine
    container_name: oku-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-oku}
      POSTGRES_USER: ${POSTGRES_USER:-oku}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-oku}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-oku} -d ${POSTGRES_DB:-oku}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oku-net

  redis:
    image: redis:7.4-alpine
    container_name: oku-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - oku-net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oku-backend
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      DEBUG: "false"
      API_PREFIX: ${API_PREFIX:-/api/v1}
      ENABLE_LEGACY_ROUTES: ${ENABLE_LEGACY_ROUTES:-true}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-oku}:${POSTGRES_PASSWORD:-oku}@db:5432/${POSTGRES_DB:-oku}
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      CORS_ORIGINS: ${BACKEND_CORS_ORIGINS:-https://oku.com.kz,https://www.oku.com.kz}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace_me_with_32_characters_minimum_secret}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-replace_me_with_32_characters_minimum_refresh_secret}
      SEED_DEMO_DATA: ${PROD_SEED_DEMO_DATA:-false}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    expose:
      - "8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=2)",
        ]
      interval: 15s
      timeout: 5s
      retries: 5
    networks:
      - oku-net

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: oku-worker
    restart: unless-stopped
    env_file:
      - ./.env
    environment:
      APP_ENV: production
      DEBUG: "false"
      API_PREFIX: ${API_PREFIX:-/api/v1}
      ENABLE_LEGACY_ROUTES: ${ENABLE_LEGACY_ROUTES:-true}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-oku}:${POSTGRES_PASSWORD:-oku}@db:5432/${POSTGRES_DB:-oku}
      REDIS_URL: redis://redis:6379/0
      REDIS_ENABLED: "true"
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-replace_me_with_32_characters_minimum_secret}
      JWT_REFRESH_SECRET_KEY: ${JWT_REFRESH_SECRET_KEY:-replace_me_with_32_characters_minimum_refresh_secret}
    command: ["rq", "worker", "default"]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - oku-net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.oku.com.kz}
        NEXT_PUBLIC_API_PREFIX: ${PUBLIC_API_PREFIX:-/api/v1}
        NEXT_PUBLIC_PUBLIC_SITE_URL: ${NEXT_PUBLIC_PUBLIC_SITE_URL:-https://oku.com.kz}
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.oku.com.kz}
        NEXT_PUBLIC_APP_HOSTNAME: ${NEXT_PUBLIC_APP_HOSTNAME:-app.oku.com.kz}
        NEXT_PUBLIC_PUBLIC_HOSTNAME: ${NEXT_PUBLIC_PUBLIC_HOSTNAME:-oku.com.kz}
    container_name: oku-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-https://api.oku.com.kz}
      NEXT_PUBLIC_API_PREFIX: ${PUBLIC_API_PREFIX:-/api/v1}
      NEXT_PUBLIC_PUBLIC_SITE_URL: ${NEXT_PUBLIC_PUBLIC_SITE_URL:-https://oku.com.kz}
      NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_PUBLIC_SITE_URL:-https://oku.com.kz}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-https://app.oku.com.kz}
      NEXT_PUBLIC_APP_HOSTNAME: ${NEXT_PUBLIC_APP_HOSTNAME:-app.oku.com.kz}
      NEXT_PUBLIC_PUBLIC_HOSTNAME: ${NEXT_PUBLIC_PUBLIC_HOSTNAME:-oku.com.kz}
    depends_on:
      backend:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 7s
      retries: 6
    networks:
      - oku-net

  proxy:
    image: caddy:2.8-alpine
    container_name: oku-proxy
    restart: unless-stopped
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-oku.com.kz}
      API_DOMAIN: ${API_DOMAIN:-api.oku.com.kz}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL:-admin@oku.com.kz}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - oku-net

volumes:
  postgres_data:
  redis_data:
  caddy_data:
  caddy_config:

networks:
  oku-net:
    driver: bridge
